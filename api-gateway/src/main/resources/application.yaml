server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: player-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/players,/api/players/**
          filters:
            - StripPrefix=1

        - id: scouting-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/scouts,/api/scouts/**
          filters:
            - StripPrefix=1