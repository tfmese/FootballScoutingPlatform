server:
  port: 8081

spring:
  application:
    name: player-service

  datasource:
    url: jdbc:postgresql://localhost:5432/player_db
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true